version: '3.8'

services:
  # PostgreSQL Database with encryption at rest
  postgres:
    image: postgres:15-alpine
    container_name: ckd_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ckd_network
    # Do not expose ports externally in production

  # Redis Cache with persistence and password
  redis:
    image: redis:7-alpine
    container_name: ckd_redis_prod
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ckd_network
    # Do not expose ports externally in production

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ckd_backend_prod
    environment:
      # Application
      APP_NAME: ${APP_NAME}
      APP_VERSION: ${APP_VERSION}
      DEBUG: "False"
      
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      
      # Security
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      
      # ML Model
      MODEL_PATH: ${MODEL_PATH}
      MODEL_VERSION: ${MODEL_VERSION}
      
      # Risk Thresholds
      RISK_THRESHOLD_HIGH: ${RISK_THRESHOLD_HIGH}
      RISK_THRESHOLD_MODERATE: ${RISK_THRESHOLD_MODERATE}
      
      # Performance SLAs
      PREDICTION_TIMEOUT_MS: ${PREDICTION_TIMEOUT_MS}
      SHAP_TIMEOUT_MS: ${SHAP_TIMEOUT_MS}
      INTERVENTION_INITIATION_HOURS: ${INTERVENTION_INITIATION_HOURS}
      
      # Cost-Effectiveness
      TARGET_BCR: ${TARGET_BCR}
      COST_STAGE5_PER_YEAR: ${COST_STAGE5_PER_YEAR}
      COST_STAGE3_PER_YEAR: ${COST_STAGE3_PER_YEAR}
      
      # Fairness Monitoring
      MAX_AUROC_DISPARITY: ${MAX_AUROC_DISPARITY}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS}
      
      # Encryption key for data at rest
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro
      - backend_logs:/app/logs
    restart: always
    networks:
      - ckd_network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Do not expose ports externally in production

  # Nginx reverse proxy with TLS 1.3
  nginx:
    image: nginx:alpine
    container_name: ckd_nginx_prod
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro
    depends_on:
      - backend
    restart: always
    networks:
      - ckd_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local

networks:
  ckd_network:
    driver: bridge
